spring.application.name=entretien

# Server Configuration
server.port=8080

# Database Configuration - H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration - disabled for tests
spring.flyway.enabled=false

# Spring AI Configuration (mock values for tests)
spring.ai.openai.api-key=test-key
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7

# External AI Services Configuration (mock values for tests)
whisper.api.url=https://api.openai.com
whisper.api.key=test-key

elevenlabs.api.url=https://api.elevenlabs.io
elevenlabs.api.key=test-key

did.api.url=https://api.d-id.com
did.api.key=test-key

# Logging Configuration
logging.level.com.master2sir.entretien=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
