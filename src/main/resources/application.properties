spring.application.name=entretien

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/interview_simulator
spring.datasource.username=postgres
spring.datasource.password=postgresql
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Spring AI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-api-key}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7

# External AI Services Configuration
whisper.api.url=https://api.openai.com
whisper.api.key=${OPENAI_API_KEY:your-openai-api-key}

elevenlabs.api.url=https://api.elevenlabs.io
elevenlabs.api.key=${ELEVENLABS_API_KEY:your-elevenlabs-api-key}

did.api.url=https://api.d-id.com
did.api.key=${DID_API_KEY:your-did-api-key}

# Logging Configuration
logging.level.com.master2sir.entretien=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
